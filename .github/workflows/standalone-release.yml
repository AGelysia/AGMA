name: Standalone Client Release

on:
  push:
    tags:
      - "standalone-v*"

permissions:
  contents: write

concurrency:
  group: standalone-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22.22.2"
          cache: npm
          cache-dependency-path: agent-runtime/package-lock.json
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Install release tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends ripgrep
      - name: Verify standalone tag
        shell: bash
        run: |
          version="$(node -p "require('./standalone-client/version.json').version")"
          [[ "$GITHUB_REF_NAME" == "standalone-v$version" ]]
      - name: Build and verify standalone clients twice
        run: ./scripts/standalone-release-check.sh "$GITHUB_WORKSPACE/build/standalone-release"
      - name: Verify standalone release inventory
        shell: bash
        run: |
          version="$(node -p "require('./standalone-client/version.json').version")"
          release_directory="$GITHUB_WORKSPACE/build/standalone-release"
          [[ "$(find "$release_directory" -mindepth 1 -maxdepth 1 -type f | wc -l)" -eq 8 ]]
          [[ "$(find "$release_directory" -mindepth 1 -maxdepth 1 -type f -name '*.jar' | wc -l)" -eq 6 ]]
          for target in mc1.18.2-fabric mc1.18.2-forge mc1.21.11-fabric; do
            for platform in linux-x86_64 windows-x86_64; do
              test -f "$release_directory/AGMA-Client-Standalone-${version}-${target}-${platform}.jar"
            done
          done
          test -f "$release_directory/AGMA-Client-Standalone-${version}-SBOM.cdx.json"
          test -f "$release_directory/AGMA-Client-Standalone-${version}-SHA256SUMS"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: standalone-release-${{ github.sha }}
          path: build/standalone-release/
          if-no-files-found: error
          retention-days: 7

  windows-sidecar:
    needs: build
    runs-on: windows-2022
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: standalone-release-${{ github.sha }}
          path: ${{ runner.temp }}/standalone-release
      - name: Execute embedded Windows Runtime
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.Substring("standalone-v".Length)
          ./scripts/verify-standalone-release-windows.ps1 `
            -ReleaseDirectory "${{ runner.temp }}/standalone-release" `
            -Version $version `
            -RuntimeVersion $version `
            -NodeVersion "22.23.1"

  publish:
    needs: [build, windows-sidecar]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: standalone-release-${{ github.sha }}
          path: standalone-release
      - name: Publish standalone GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          version="$(node -p "require('./standalone-client/version.json').version")"
          gh release create "$GITHUB_REF_NAME" \
            standalone-release/*.jar \
            standalone-release/*-SBOM.cdx.json \
            standalone-release/*-SHA256SUMS \
            --verify-tag \
            --generate-notes \
            --title "AGMA Standalone Client $version"

name: Compatibility Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: compatibility-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22.22.2"
          cache: npm
          cache-dependency-path: agent-runtime/package-lock.json
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Install release tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends ripgrep
      - name: Verify tag
        shell: bash
        run: |
          version="$(node -p "require('./agent-runtime/package.json').version")"
          [[ "$GITHUB_REF_NAME" == "v$version" ]]
      - name: Build and verify compatibility release
        run: ./scripts/release-check.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: compatibility-release-${{ github.sha }}
          path: release/
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: compatibility-release-${{ github.sha }}
          path: release
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          version="$(node -p "require('./agent-runtime/package.json').version")"
          gh release create "$GITHUB_REF_NAME" \
            release/*.jar \
            release/*.zip \
            release/SHA256SUMS \
            --verify-tag \
            --generate-notes \
            --title "AGMA $version"
